name: Verify Tests

on:
  push:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create ./bin and ./output directories
        run: mkdir -p ./bin ./output

      - name: Build Flower
        working-directory: .
        env:
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=1:strict_string_checks=1
        run:  |
          ls ./bin
          gcc \
            -fsanitize=address \
            -fno-omit-frame-pointer \
            -g \
            -O0 \
            -Wall \
            -Wextra \
            ./bin/Flower.c \
            -o ./bin/Flower
          ./bin/Flower ./src/main.flo ./bin/Flower

      - name: Run Tests
        run:  ./bin/Flower ./examples/test.flo ./output/out